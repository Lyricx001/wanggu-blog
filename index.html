<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta id="metaDescription" name="description" content="WANGGU BLOG - 记录技术、跨境电商与自由职业生活" />
  <meta name="theme-color" content="#111111" />
  <title>WANGGU BLOG</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="pageLoader" class="page-loader" aria-hidden="true">
    <div class="loader-inner">
      <div class="loader-mark">W</div>
      <div class="loader-track"><span></span></div>
    </div>
  </div>
  <div id="scrollProgress" class="scroll-progress" aria-hidden="true"></div>
  <canvas id="ambientCanvas" class="ambient-canvas" aria-hidden="true"></canvas>
  <div id="cursorGlow" class="cursor-glow" aria-hidden="true"></div>
  <div class="site-shell">
    <header class="topbar">
      <a class="brand" href="#home" aria-label="返回首页">
        <span id="brandMark" class="brand-mark">W</span>
        <span id="brandText" class="brand-text">WANGGU BLOG</span>
      </a>

      <nav class="nav">
        <a href="#home" data-nav="home">首页</a>
        <a href="#articles" data-nav="articles">文章</a>
        <a href="#about" data-nav="about">关于</a>
      </nav>

      <button id="themeToggle" class="icon-btn" type="button" aria-label="切换深色模式">
        <span class="theme-icon">◐</span>
      </button>
    </header>

    <main id="app" class="main-content"></main>

    <footer class="footer">
      <span>© <span id="year"></span> <span id="footerSiteName">WANGGU BLOG</span></span>
      <span><span id="footerText">由 Cloudflare Pages 托管</span> · <a href="https://app.pagescms.org" target="_blank" rel="noopener">博客后台</a></span>
    </footer>
  </div>

  <template id="homeTemplate">
    <section class="hero card">
      <div class="hero-copy">
        <span id="heroEyebrow" class="eyebrow">PERSONAL BLOG</span>
        <h1 id="heroTitle">记录技术、跨境电商<br />与自由职业生活。</h1>
        <p id="heroDescription">这里分享我正在做的项目、解决过的问题，以及一路上的经验和想法。</p>
        <div class="hero-actions">
          <a class="primary-btn" href="#articles">浏览文章</a>
          <a class="ghost-btn" href="#about">了解我</a>
        </div>
        <div class="scroll-hint"><span></span>向下浏览</div>
      </div>
      <div class="hero-art" aria-hidden="true">
        <div class="orb orb-a"></div>
        <div class="orb orb-b"></div>
        <div class="art-card art-card-one">BLOG</div>
        <div class="art-card art-card-two">IDEAS</div>
        <div class="art-card art-card-three"><span class="live-dot"></span> ONLINE</div>
      </div>
    </section>

    <section class="section-head">
      <div>
        <span class="eyebrow">FEATURED</span>
        <h2 id="featuredTitle">精选文章</h2>
      </div>
      <a class="text-link" href="#articles">查看全部 →</a>
    </section>

    <section id="featuredPosts" class="post-grid"></section>

    <section class="newsletter card">
      <div>
        <span class="eyebrow">KEEP IN TOUCH</span>
        <h2 id="updateTitle">持续更新中</h2>
        <p id="updateDescription">博客会继续记录技术实践、跨境业务和个人成长。</p>
      </div>
      <a class="primary-btn" href="#articles">开始阅读</a>
    </section>
  </template>

  <template id="articlesTemplate">
    <section class="page-heading">
      <span class="eyebrow">ARTICLES</span>
      <h1>全部文章</h1>
      <p>搜索标题、摘要或分类，快速找到你想看的内容。</p>
    </section>

    <section class="toolbar card">
      <label class="search-box">
        <span>⌕</span>
        <input id="searchInput" type="search" placeholder="搜索文章..." autocomplete="off" />
      </label>
      <div id="categoryFilters" class="filters"></div>
    </section>

    <section id="articleList" class="post-list"></section>
    <div id="emptyState" class="empty-state card" hidden>
      <strong>没有找到相关文章</strong>
      <span>换个关键词或分类试试。</span>
    </div>
  </template>

  <template id="aboutTemplate">
    <section class="about-grid">
      <article class="about-main card">
        <span class="eyebrow">ABOUT ME</span>
        <h1 id="aboutTitle">你好，我是这个博客的作者。</h1>
        <p id="aboutParagraph1">我是一名自由职业者，平时关注技术工具、跨境电商、网站搭建与效率提升。</p>
        <p id="aboutParagraph2">这个博客用来记录真实的实践过程：做过什么、踩过哪些坑、最后怎样解决。</p>
        <p id="aboutParagraph3">这里不会刻意追求复杂，内容会尽量直接、清楚、可操作。</p>
      </article>

      <aside class="about-side">
        <div class="profile-card card">
          <div id="profileAvatar" class="avatar">W</div>
          <h2 id="authorName">WANGGU</h2>
          <p id="authorTagline">自由职业者 · 实践者 · 持续学习</p>
        </div>
        <div class="card mini-card">
          <span>常写主题</span>
          <strong id="topics">技术 / 跨境电商 / 效率工具</strong>
        </div>
        <div class="card mini-card">
          <span>网站地址</span>
          <strong id="websiteAddress">wanggu.top</strong>
        </div>
      </aside>
    </section>
  </template>

  <template id="postTemplate">
    <article class="post-page">
      <a class="back-link" href="#articles">← 返回文章列表</a>
      <header class="post-header card">
        <div id="postMeta" class="post-meta"></div>
        <h1 id="postTitle"></h1>
        <p id="postExcerpt"></p>
      </header>
      <div id="postCoverWrap" class="post-cover-wrap card" hidden>
        <img id="postCoverImage" class="post-cover-image" src="" alt="" loading="lazy" />
      </div>
      <section id="postContent" class="article-body card"></section>
    </article>
  </template>


  <div id="imageLightbox" class="image-lightbox" hidden>
    <button id="lightboxClose" class="lightbox-close" type="button" aria-label="关闭图片预览">×</button>
    <img id="lightboxImage" class="lightbox-image" src="" alt="" />
  </div>

  <script src="script.js"></script>
</body>
</html>
